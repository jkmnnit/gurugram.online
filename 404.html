<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 – Page Not Found | Gurugram.online</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      *{margin:0;padding:0;box-sizing:border-box;}
      body{background:#0A0F1E;color:#F5F5F5;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;position:relative;}
      body::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 40%,rgba(212,168,83,0.06) 0%,transparent 50%),radial-gradient(circle at 70% 60%,rgba(0,201,177,0.04) 0%,transparent 50%);animation:float 20s ease-in-out infinite;pointer-events:none;}
      @keyframes float{0%,100%{transform:translate(0,0);}50%{transform:translate(-20px,15px);}}
      .container{max-width:480px;width:100%;text-align:center;position:relative;z-index:1;}
      .error-code{font-family:'Playfair Display',serif;font-size:120px;font-weight:700;line-height:1;background:linear-gradient(135deg,#D4A853 0%,#00C9B1 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
      .glass-card{background:rgba(26,26,46,0.6);backdrop-filter:blur(16px) saturate(150%);-webkit-backdrop-filter:blur(16px) saturate(150%);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:40px 32px;box-shadow:0 8px 32px rgba(0,0,0,0.3);}
      h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:12px;color:#F5F5F5;}
      p{font-size:15px;line-height:1.6;color:#9A9A9A;margin-bottom:28px;}
      .home-btn{display:inline-block;padding:14px 36px;background:linear-gradient(135deg,#D4A853,#c4983f);color:#0A0F1E;font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;text-decoration:none;border-radius:10px;letter-spacing:0.5px;transition:all 0.3s ease;box-shadow:0 4px 20px rgba(212,168,83,0.25);}
      .home-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(212,168,83,0.35);}
      .brand{margin-top:32px;font-size:13px;color:#5A5A6A;}
      .brand span{color:#D4A853;font-weight:700;}
      @media(max-width:480px){.error-code{font-size:80px;}.glass-card{padding:32px 20px;}h1{font-size:22px;}}
    </style>
  </head>
  <body>
    <div class="container">
      <div class="glass-card">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved. Let's get you back to exploring Gurugram.</p>
        <a href="/" class="home-btn">← Back to Home</a>
      </div>
      <div class="brand">✦ <span>gurugram.online</span> — Premium City Directory</div>
    </div>
  </body>
</html>
